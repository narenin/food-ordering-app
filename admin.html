<!-- admin.html -->
<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
body{background:#f4f4f4;font-family:Arial;}
.admin-box{max-width:500px;margin:auto;margin-top:60px;background:white;padding:30px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,0.2);}
</style>
</head>
<body>

<div id="login-section" class="admin-box">
<h3 class="text-center mb-4">Admin Login</h3>
<form onsubmit="adminLogin(event)">
<input type="email" id="adminEmail" class="form-control mb-2" placeholder="Email" required>
<input type="password" id="adminPassword" class="form-control mb-2" placeholder="Password" required>
<button class="btn btn-primary w-100">Login</button>
</form>
</div>

<div id="dashboard" style="display:none;" class="container mt-5">
<h2 class="text-center mb-4">Admin Dashboard</h2>
<div class="row">
<div class="col-md-6">
<div class="card p-3 mb-3">
<h4>Add New Food Item</h4>
<form onsubmit="addFood(event)">
<input type="text" id="foodName" class="form-control mb-2" placeholder="Food Name" required>
<input type="number" id="foodPrice" class="form-control mb-2" placeholder="Price" required>
<input type="text" id="foodImage" class="form-control mb-2" placeholder="Image URL" required>
<button class="btn btn-success w-100">Add Food</button>
</form>
</div>
</div>

<div class="col-md-6">
<div class="card p-3">
<h4>Menu Items</h4>
<ul id="foodList" class="list-group"></ul>
</div>
</div>
</div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
